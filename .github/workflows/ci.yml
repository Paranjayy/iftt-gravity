name: Gravity CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Create a blank config.json so the build doesn't fail when readConfig() runs
      - name: Create blank config for build
        run: echo '{}' > config.json

      - name: Type check
        run: bun x tsc --noEmit

      - name: Build
        run: bun run build
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # Suppress Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1
